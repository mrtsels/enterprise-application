server:
  port: 8080

spring:
  application:
    name: enterprise-application
  datasource:
    url: jdbc:mysql://localhost:3306/enterprise_mvp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: enterprise
    password: enterprise123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

ai:
  vision:
    api-key: ${AI_VISION_KEY:sk-placeholder}
    base-url: ${AI_VISION_URL:http://localhost:8000}
    model: ${AI_VISION_MODEL:gpt-4o-vision}
    max-tokens: 81920

app:
  upload:
    path: ${UPLOAD_PATH:./uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
