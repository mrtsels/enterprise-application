<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>申报填表 - 专精特新"小巨人"预申报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
body{background:#f0f2f5;color:#262626}
:root{--primary:#1677ff;--success:#52c41a;--warning:#faad14;--danger:#ff4d4f;--bg:#f0f2f5;--card:#fff;--text2:#8c8c8c;--border:#e8e8e8;--radius:8px}
.header{background:linear-gradient(135deg,#1677ff,#0958d9);color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600}.header .sub{font-size:11px;opacity:.75}
.header-right{display:flex;align-items:center;gap:10px}
.container{max-width:960px;margin:0 auto;padding:12px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--primary)}
.sec-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;background:var(--card);border-radius:var(--radius);padding:6px;border:1px solid var(--border)}
.sec-nav button{padding:6px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border-radius:6px;transition:all .2s}
.sec-nav button:hover{background:#f0f5ff;color:var(--primary)}
.sec-nav button.active{background:var(--primary);color:#fff}
.sec-pane{display:none}.sec-pane.active{display:block}
.sec-title{font-size:14px;font-weight:600;margin:16px 0 8px;padding:6px 10px;background:#f0f5ff;border-left:3px solid var(--primary)}
.sec-sub{font-size:13px;font-weight:600;margin:12px 0 6px;color:var(--text2)}
.form-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;flex-wrap:wrap}
.form-row>label{font-size:13px;color:#262626;min-width:130px;padding-top:6px;flex-shrink:0}
.form-row>label .req{color:var(--danger)}
.form-row>input,.form-row>select,.form-row>textarea{padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;outline:none;background:#fff}
.form-row>input:focus,.form-row>select:focus,.form-row>textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.form-row>input,.form-row>select{flex:1;min-width:180px}.form-row>textarea{flex:1;min-width:180px;resize:vertical;min-height:50px}
.form-row .note{font-size:12px;color:var(--text2);padding-top:7px}
.opt-row{margin-bottom:6px;padding-left:140px}
.opt-row .og{display:flex;flex-wrap:wrap;gap:8px}
.opt-row label,.opt-row .og label{font-size:13px;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.sub-table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0 12px}
.sub-table th,.sub-table td{padding:6px 8px;text-align:left;border:1px solid var(--border)}
.sub-table th{background:#fafafa;font-weight:600;color:var(--text2);font-size:11px;text-align:center}
.sub-table td input,.sub-table td select{width:100%;padding:4px 5px;border:1px solid var(--border);border-radius:4px;font-size:12px;outline:none}
.sub-table td input:focus,.sub-table td select:focus{border-color:var(--primary)}
.sub-table td{text-align:center}.sub-table td:first-child{text-align:left;font-weight:500}
.btn{padding:7px 16px;border-radius:6px;border:1px solid var(--border);font-size:13px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{background:#4096ff}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-danger{background:#fff;color:var(--danger);border-color:var(--danger)}
.btn-outline{background:#fff;color:var(--text2)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:12px}
.bottom-bar{position:sticky;bottom:0;background:var(--card);border-radius:0;padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;align-items:center}
.toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:8px;color:#fff;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast-success{background:var(--success)}.toast-error{background:var(--danger)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:24px;min-width:380px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* Business License Upload */
.bl-upload-card{background:#fafcff;border:1px dashed #1677ff;border-radius:8px;margin-bottom:14px;overflow:hidden}
.bl-upload-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f0f5ff;border-bottom:1px solid #e6f0ff}
.bl-upload-title{font-size:13px;font-weight:600;color:#1677ff}
.bl-upload-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#d9d9d9;color:#595959}
.bl-upload-badge.success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.bl-upload-badge.uploaded{background:#e6f7ff;color:#1677ff;border:1px solid #91d5ff}
.bl-upload-body{padding:12px}
.bl-dropzone{border:2px dashed #d9d9d9;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.bl-dropzone:hover,.bl-dropzone.dragover{border-color:#1677ff;background:#f0f5ff}
.bl-dropzone-icon{font-size:32px;margin-bottom:6px}
.bl-dropzone-text{font-size:14px;color:#262626;font-weight:500}
.bl-dropzone-hint{font-size:12px;color:#8c8c8c;margin-top:4px}
.bl-preview{display:flex;flex-direction:column;align-items:center;gap:8px}
.bl-preview-img{max-height:160px;max-width:100%;border-radius:6px;border:1px solid #e8e8e8;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.bl-preview-actions{display:flex;gap:8px}
.bl-progress{text-align:center}
.bl-progress-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin:8px 0}
.bl-progress-fill{height:100%;background:#1677ff;border-radius:3px;width:0%;transition:width .3s}
.bl-progress-text{font-size:12px;color:#8c8c8c}
.ocr-badge{display:inline-block;font-size:11px;color:#52c41a;background:#f6ffed;border:1px solid #b7eb8f;border-radius:3px;padding:1px 5px;margin-left:6px;font-weight:500}

@media(max-width:768px){.form-row{flex-direction:column}.form-row>label{min-width:auto}.opt-row{padding-left:0}}
</style>
</head>
<body>

<div class="header">
  <div><h1>✏️ 专精特新"小巨人"预申报书</h1><div class="sub">按工信部标准表单在线填报</div></div>
  <div class="header-right">
    <span id="headerName" style="font-size:13px"></span>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)" onclick="location.href='http://localhost:3000'">关闭</button>
  </div>
</div>

<div class="container" id="app">
  <div class="sec-nav" id="secNav">
    <button class="active" data-sec="1">一、基本情况</button>
    <button data-sec="2">二、经济效益</button>
    <button data-sec="3">三、专业化</button>
    <button data-sec="4">四、精细化</button>
    <button data-sec="5">五、特色化</button>
    <button data-sec="6">六、创新能力</button>
    <button data-sec="7">七、产业链配套</button>
    <button data-sec="8">八、主导产品领域</button>
    <button data-sec="9">九、其他</button>
  </div>

  <div id="formContent"></div>

  <div class="bottom-bar">
    <span id="formStatus" style="font-size:12px;color:var(--text2);flex:1"></span>
    <button class="btn btn-outline btn-sm" onclick="resetForm()">🔄 重置</button>
    <button class="btn btn-primary btn-sm" onclick="saveDraft()">💾 保存草稿</button>
    <button class="btn btn-success btn-sm" onclick="submitDecl()">📨 提交预申报</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>

<script>
// ===== Read params from portal =====
const params = new URLSearchParams(location.search)
const API='http://localhost:8080/api'
let enterpriseId = parseInt(params.get('enterpriseId')) || null
let declarationId = params.get('declarationId') ? parseInt(params.get('declarationId')) : null
let mode = params.get('mode') || 'new'
let ent = null
let curId = declarationId || null

// City data
const cities={'广东省':['广州市','深圳市','珠海市','汕头市','佛山市','韶关市','湛江市','肇庆市','江门市','茂名市','惠州市','梅州市','汕尾市','河阳江市','清远市','东莞市','中山市','潮州市','揭阳市','云浮市'],'浙江省':['杭州市','宁波市','温州市','嘉兴市','湖州市','绍兴市','金华市','衢州市','舟山市','台州市','丽水市'],'江苏省':['南京市','无锡市','徐州市','常州市','苏州市','南通市','连云港市','淮安市','盐城市','扬州市','镇江市','泰州市','宿迁市'],'北京市':['东城区','西城区','朝阳区','海淀区','丰台区','石景山区','通州区','大兴区','顺义区','昌平区'],'上海市':['黄浦区','徐汇区','长宁区','静安区','普陀区','虹口区','杨浦区','浦东新区','闵行区','宝山区','嘉定区']}
const dists={'广州市':['荔湾区','越秀区','海珠区','天河区','白云区','黄埔区','番禺区','花都区','南沙区','从化区','增城区'],'深圳市':['罗湖区','福田区','南山区','宝安区','龙岗区','盐田区','龙华区','坪山区','光明区'],'杭州市':['上城区','拱墅区','西湖区','滨江区','萧山区','余杭区','临平区','钱塘区','富阳区','临安区'],'北京市':['东城区','西城区','朝阳区','海淀区','丰台区','石景山区','通州区','大兴区','顺义区','昌平区'],'上海市':['黄浦区','徐汇区','长宁区','静安区','普陀区','虹口区','杨浦区','浦东新区','闵行区','宝山区','嘉定区']}

function updCity(){const p=$('f_province'),c=$('f_city');c.innerHTML='<option value="">— 市(区) —</option>';if(cities[p.value])cities[p.value].forEach(v=>{c.innerHTML+='<option value="'+v+'">'+v+'</option>'});updDist()}
function updDist(){const c=$('f_city'),d=$('f_district');d.innerHTML='<option value="">— 县(区) —</option>';if(dists[c.value])dists[c.value].forEach(v=>{d.innerHTML+='<option value="'+v+'">'+v+'</option>'})}
function toggleListed(){const v=document.querySelector('input[name="f_listed"]:checked');($('listingPlan')).style.display=v&&v.value==='plan'?'block':'none';($('f_stockCode')).disabled=!v||v.value!=='listed'}

function $(id){return document.getElementById(id)}
function toast(m,t){const e=$('toast');e.textContent=m;e.className='toast toast-'+(t||'success')+' show';setTimeout(()=>e.classList.remove('show'),2500)}
function showModal(h){$('modalContent').innerHTML=h;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
$('modal').onclick=e=>{if(e.target===e.currentTarget)closeModal()}

function api(m,p,d){return fetch(API+p,{method:m,headers:{'Content-Type':'application/json'},body:d?JSON.stringify(d):undefined}).then(r=>r.ok?r.json().catch(()=>({})):r.json().then(e=>{throw new Error(e.message||'请求失败')}))}

// ===== Init =====
async function init(){
  // Load enterprise
  if(enterpriseId){
    try{ent=await api('GET','/enterprises/'+enterpriseId);$('headerName').textContent=ent.name}catch(e){}
  }
  renderForm()
  // 新建申报：清空所有演示数据字段
  if (mode === 'new') {
    setTimeout(clearAllFields, 50)
  }
  initBlUpload()
  // Load existing declaration
  if(curId){
    try{
      const d=await api('GET','/declarations/'+curId)
      $('formStatus').textContent = mode === 'view' ? '🔍 查看申报 #'+curId : '📝 编辑申报 #'+curId
      // 加载字段填充
      if(d.enterpriseName) $('f_name').value = d.enterpriseName
      if(d.creditCode) $('f_creditCode').value = d.creditCode
      if(d.legalRepresentative) $('f_legalRep').value = d.legalRepresentative
      if(d.estDate) $('f_estDate').value = d.estDate
      if(d.fullAddress) $('f_address').value = d.fullAddress
      if(d.registeredCapital) $('f_regCapital').value = d.registeredCapital
      if(d.province && $('f_province')) { setSel('f_province', d.province); updCity(); }
      if(d.city && $('f_city')) { setTimeout(()=>setSel('f_city', d.city), 100); updDist(); }
      if(d.district && $('f_district')) { setTimeout(()=>setSel('f_district', d.district), 200); }
      if(d.contactPerson) $('f_contact').value = d.contactPerson
      if(d.contactPhone) $('f_tel').value = d.contactPhone
      if(d.contactMobile) $('f_mobile').value = d.contactMobile
      if(d.email) $('f_email').value = d.email

      if(d.revenue)$('f_rev25').value=d.revenue
      if(d.rdInvestment)$('f_rdInv25').value=d.rdInvestment
      if(d.rdRatio)$('f_rdRatio25').value=d.rdRatio
      if(d.marketYears)$('f_marketYears').value=d.marketYears
      if(d.productName)$('f_productName').value=d.productName
      if(d.mainRevenueRatio)$('f_mainRevRatio').value=d.mainRevenueRatio
      if(d.revenueGrowth2yAvg)$('f_revGrowth2y').value=d.revenueGrowth2yAvg
      if(d.debtRatio)$('f_debt25').value=d.debtRatio
      if(d.netProfit)$('f_netP25').value=d.netProfit
    }catch(e){toast('加载申报数据失败','error')}

    // 查看模式：锁定所有字段，隐藏操作按钮
    if (mode === 'view') {
      setAllFieldsReadonly()
      // 锁定底部工具栏
      const bar = document.querySelector('.bottom-bar')
      if (bar) bar.style.display = 'none'
      // 隐藏OCR区域
      const blCard = document.querySelector('.bl-upload-card')
      if (blCard) blCard.style.display = 'none'
    }
  }else{
    $('formStatus').textContent='📝 新建预申报'
  }
}

// ===== Render sections =====
function renderForm(){
  $('formContent').innerHTML = `
<div class="card sec-pane active" id="sec-1">
<div class="card-title">一、企业基本情况</div>

<!-- ===== Business License OCR Upload ===== -->
<div class="bl-upload-card">
  <div class="bl-upload-header">
    <span class="bl-upload-title">📎 营业执照（副本）识别</span>
    <span class="bl-upload-badge" id="bl-status-badge">未上传</span>
  </div>
  <div class="bl-upload-body">
    <!-- Drop zone -->
    <div class="bl-dropzone" id="bl-dropzone">
      <div class="bl-dropzone-icon">📄</div>
      <div class="bl-dropzone-text">点击或拖拽上传营业执照</div>
      <div class="bl-dropzone-hint">支持 JPG/PNG，不超过 10MB</div>
      <input type="file" id="bl-file-input" accept=".jpg,.jpeg,.png" hidden>
    </div>
    <!-- Preview -->
    <div class="bl-preview" id="bl-preview" style="display:none">
      <img id="bl-preview-img" class="bl-preview-img">
      <div class="bl-preview-actions">
        <button class="btn btn-sm btn-outline" onclick="resetBlUpload()" type="button">重新选择</button>
        <button class="btn btn-sm btn-primary" onclick="startBlOcr()" type="button">🔍 识别营业执照</button>
      </div>
    </div>
    <!-- Progress -->
    <div class="bl-progress" id="bl-progress" style="display:none">
      <div class="bl-progress-bar"><div class="bl-progress-fill" id="bl-progress-fill"></div></div>
      <div class="bl-progress-text" id="bl-progress-text">正在上传并识别...</div>
    </div>
  </div>
</div>
<!-- ===== END NEW ===== -->

<div class="form-row"><label>企业名称 <span class="req">*</span></label><input id="f_name" value="${ent?ent.name:'广州测试科技有限公司'}"></div>
<div class="form-row"><label>统一社会信用代码</label><input id="f_creditCode" value="91440101MA5XXXXXXX"></div>
<div class="sec-sub">企业注册地</div>
<div class="form-row"><label>注册地</label>
<select id="f_province" style="flex:0.4;min-width:110px" onchange="updCity()"><option value="">—省—</option><option value="北京市">北京市</option><option value="天津市">天津市</option><option value="上海市">上海市</option><option value="广东省" selected>广东省</option><option value="浙江省">浙江省</option><option value="江苏省">江苏省</option><option value="福建省">福建省</option><option value="山东省">山东省</option><option value="四川省">四川省</option></select>
<select id="f_city" style="flex:0.4;min-width:110px" onchange="updDist()"><option value="">—市(区)—</option><option value="广州市" selected>广州市</option></select>
<select id="f_district" style="flex:0.4;min-width:110px"><option value="">—县(区)—</option><option value="海珠区" selected>海珠区</option></select></div>
<div class="form-row"><label>通讯地址</label><input id="f_address" value="广州市海珠区新港中路123号"></div>
<div class="form-row"><label>邮编</label><input id="f_zip" value="510310" style="max-width:130px"></div>
<div class="form-row"><label>法定代表人</label><input id="f_legalRep" value="张三"></div>
<div class="form-row"><label>控股股东</label><input id="f_controller" value="广州测试控股集团"></div>
<div class="form-row"><label>实际控制人</label><input id="f_actualCtrl" value="李四"></div>
<div class="form-row"><label>实际控制人国籍</label><input id="f_ctrlNation" value="中国"></div>
<div class="form-row"><label>联系人</label><input id="f_contact" value="王五"></div>
<div class="form-row"><label>电话</label><input id="f_tel" value="020-88886666" style="max-width:180px"></div>
<div class="form-row"><label>手机</label><input id="f_mobile" value="13800138000" style="max-width:180px"></div>
<div class="form-row"><label>传真</label><input id="f_fax" value="020-88886667" style="max-width:180px"></div>
<div class="form-row"><label>E-mail</label><input id="f_email" type="email" value="contact@test-tech.com"></div>
<div class="form-row"><label>注册时间</label><input id="f_estDate" type="date" value="2015-06-15" style="max-width:170px"></div>
<div class="form-row"><label>注册资本（万元）</label><input id="f_regCapital" type="number" value="5000" style="max-width:150px"></div>
<div class="sec-sub">企业规模</div>
<div class="form-row"><label>根据《中小企业划型标准规定》</label>
<div class="inline-group" style="display:flex;gap:8px;align-items:center">
<label><input type="radio" name="f_scale" value="大型"> 大型</label>
<label><input type="radio" name="f_scale" value="中型" checked> 中型</label>
<label><input type="radio" name="f_scale" value="小型"> 小型</label>
<label><input type="radio" name="f_scale" value="微型"> 微型</label></div></div>
<div class="sec-sub">所属行业</div>
<div class="form-row"><label>2位数代码及名称</label>
<select id="f_indCode" style="max-width:90px"><option value="">代码</option><option value="C">C</option><option value="I" selected>I</option><option value="M">M</option></select>
<select id="f_indName" style="flex:1"><option value="制造业">制造业</option><option value="软件和信息技术服务业" selected>软件和信息技术服务业</option><option value="生物医药">生物医药</option></select></div>
<div class="form-row"><label>具体细分领域<br><span style="font-size:11px;color:var(--text2)">4位数代码及名称</span></label>
<input id="f_detailCode" value="I6513" style="max-width:80px" placeholder="代码">
<input id="f_detailName" value="应用软件开发" style="flex:1" placeholder="名称"></div>
<div class="sec-sub">企业类型</div>
<div class="form-row"><label>企业类型</label>

function clearAllFields() {
  document.querySelectorAll('input, select, textarea').forEach(el => {
    if (el.type === 'radio' || el.type === 'checkbox') {
      el.checked = el.defaultChecked
      // 清空 checked：去掉 defaultChecked（演示模式默认打勾的也清掉）
      el.checked = false
    } else if (el.type === 'number') {
      el.value = ''
    } else if (el.tagName === 'SELECT') {
      el.selectedIndex = 0
    } else if (!el.readOnly) {
      el.value = ''
    }
  })
  // 清空 label/span 类的文本值（如资产负债率只读字段）
  const debtEl = $('f_debtRatio')
  if (debtEl) debtEl.value = ''
}

function setSel(id, val) {
  const sel = $(id)
  if (!sel) return
  for (const opt of sel.options) {
    if (opt.value === val) { sel.value = val; break }
  }
}

function setAllFieldsReadonly() {
  document.querySelectorAll('input, select, textarea').forEach(el => {
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.readOnly = true
      el.style.background = '#f5f5f5'
      el.style.cursor = 'default'
    } else if (el.tagName === 'SELECT') {
      el.disabled = true
      el.style.background = '#f5f5f5'
      el.style.cursor = 'default'
    }
  })
  // 禁用radio/checkbox
  document.querySelectorAll('input[type=radio], input[type=checkbox]').forEach(el => {
    el.disabled = true
  })
}

// ===== Business License OCR =====
let blFile = null

function initBlUpload() {
  const dropzone = $('bl-dropzone'), fileInput = $('bl-file-input')
  if (!dropzone || !fileInput) return
  dropzone.onclick = () => fileInput.click()
  fileInput.onchange = (e) => { if (e.target.files.length > 0) handleBlFile(e.target.files[0]) }
  dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover') }
  dropzone.ondragleave = () => dropzone.classList.remove('dragover')
  dropzone.ondrop = (e) => {
    e.preventDefault(); dropzone.classList.remove('dragover')
    if (e.dataTransfer.files.length > 0) handleBlFile(e.dataTransfer.files[0])
  }
}

function handleBlFile(file) {
  const validTypes = ['image/jpeg', 'image/png']
  if (!validTypes.includes(file.type) && !file.name.match(/\.(jpg|jpeg|png)$/i)) {
    toast('仅支持 JPG 或 PNG 格式', 'error'); return
  }
  if (file.size > 10 * 1024 * 1024) {
    toast('文件大小不能超过 10MB', 'error'); return
  }
  blFile = file
  $('bl-dropzone').style.display = 'none'
  $('bl-preview').style.display = 'flex'
  $('bl-progress').style.display = 'none'
  const reader = new FileReader()
  reader.onload = (e) => { $('bl-preview-img').src = e.target.result }
  reader.readAsDataURL(file)
  $('bl-status-badge').textContent = '已选择'
  $('bl-status-badge').className = 'bl-upload-badge uploaded'
}

async function startBlOcr() {
  if (!blFile) { toast('请先选择营业执照图片', 'error'); return }

  // 自动创建申报草稿（如尚未保存）
  if (!curId) {
    try {
      if (!enterpriseId) { toast('缺少企业信息', 'error'); return }
      const d = collectData()
      const r = await api('POST', '/declarations', d)
      curId = r.id
      $('formStatus').textContent = '📝 草稿已自动创建 (ID: ' + r.id + ')'
    } catch (e) {
      toast('自动创建申报失败: ' + (e.message || ''), 'error')
      return
    }
  }

  $('bl-preview').style.display = 'none'
  $('bl-progress').style.display = 'block'
  $('bl-progress-fill').style.width = '10%'
  $('bl-progress-text').textContent = '正在上传...'

  const formData = new FormData()
  formData.append('file', blFile)

  const xhr = new XMLHttpRequest()
  xhr.open('POST', API + '/declarations/' + curId + '/ocr/business-license')
  xhr.timeout = 60000 // 60 seconds for OCR

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100)
      $('bl-progress-fill').style.width = Math.min(pct, 50) + '%'
    }
  }

  xhr.onloadstart = function () {
    $('bl-progress-text').textContent = '正在上传...'
  }

  xhr.onload = function () {
    if (xhr.status >= 200 && xhr.status < 300) {
      $('bl-progress-fill').style.width = '100%'
      $('bl-progress-text').textContent = '识别完成，正在填充表单...'
      const result = JSON.parse(xhr.responseText)
      setTimeout(() => applyBlOcrResult(result), 300)
    } else { handleOcrError(xhr) }
  }

  xhr.onerror = () => {
    $('bl-progress').style.display = 'none'
    $('bl-preview').style.display = 'flex'
    toast('网络错误，请重试', 'error')
  }

  xhr.ontimeout = () => {
    $('bl-progress').style.display = 'none'
    $('bl-preview').style.display = 'flex'
    toast('识别超时，请稍后重试', 'error')
  }

  xhr.send(formData)
}

function applyBlOcrResult(data) {
  $('bl-progress-fill').style.width = '100%'
  $('bl-progress-text').textContent = '✅ 识别完成'
  $('bl-status-badge').textContent = '已识别'
  $('bl-status-badge').className = 'bl-upload-badge success'

  setTimeout(() => {
    $('bl-progress').style.display = 'none'
    $('bl-preview').style.display = 'flex'
  }, 800)

  // Field mapping: OCR JSON key → form field ID
  const mapping = [
    { id: 'f_name', key: 'companyName' },
    { id: 'f_creditCode', key: 'creditCode' },
    { id: 'f_legalRep', key: 'legalRepresentative' },
    { id: 'f_estDate', key: 'establishedDate' },
    { id: 'f_address', key: 'fullAddress' },
  ]

  let filled = 0
  for (const { id, key } of mapping) {
    const el = $(id), val = data[key]
    if (el && val && val !== 'null' && val !== '') {
      el.value = val
      addOcrBadge(id)
      filled++
    }
  }

  // Registered capital (number)
  const capEl = $('f_regCapital')
  if (capEl && data.capitalAmount != null && data.capitalAmount !== 'null') {
    capEl.value = data.capitalAmount
    addOcrBadge('f_regCapital')
    filled++
  }

  // Province select
  if (data.province && $('f_province')) {
    const sel = $('f_province')
    for (const opt of sel.options) {
      if (opt.value === data.province) {
        sel.value = data.province
        sel.dispatchEvent(new Event('change'))
        addOcrBadge('f_province')
        break
      }
    }
  }
  // City select (after province change populates cities)
  if (data.city && $('f_city')) {
    setTimeout(() => {
      const sel = $('f_city')
      for (const opt of sel.options) {
        if (opt.value === data.city) { sel.value = data.city; sel.dispatchEvent(new Event('change')); addOcrBadge('f_city'); break }
      }
    }, 100)
  }
  // District select (after city change populates districts)
  if (data.district && $('f_district')) {
    setTimeout(() => {
      for (const opt of $('f_district').options) {
        if (opt.value === data.district) { $('f_district').value = data.district; addOcrBadge('f_district'); break }
      }
    }, 200)
  }

  toast('营业执照识别成功，已自动填充 ' + filled + ' 个字段', 'success')
}

function addOcrBadge(fieldId) {
  const el = $(fieldId)
  if (!el) return
  const existing = el.parentElement.querySelector('.ocr-badge')
  if (existing) existing.remove()
  const badge = document.createElement('span')
  badge.className = 'ocr-badge'
  badge.textContent = 'OCR ✓'
  el.insertAdjacentElement('afterend', badge)
}

function handleOcrError(xhr) {
  $('bl-progress').style.display = 'none'
  $('bl-preview').style.display = 'flex'
  try {
    const err = JSON.parse(xhr.responseText)
    toast(err.message || '识别失败，请重试', 'error')
  } catch (e) {
    toast('识别失败 (HTTP ' + xhr.status + ')', 'error')
  }
}

function resetBlUpload() {
  blFile = null
  $('bl-dropzone').style.display = 'block'
  $('bl-preview').style.display = 'none'
  $('bl-progress').style.display = 'none'
  $('bl-status-badge').textContent = '未上传'
  $('bl-status-badge').className = 'bl-upload-badge'
  $('bl-file-input').value = ''
}

// Init
init()
</script>
</body>
</html>
