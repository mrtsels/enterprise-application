services:
  mysql:
    image: mysql:8.4
    container_name: enterprise-app-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: enterprise_mvp
      MYSQL_USER: enterprise
      MYSQL_PASSWORD: enterprise123
      MYSQL_ROOT_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3308:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: enterprise-app-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/enterprise_mvp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: enterprise
      SPRING_DATASOURCE_PASSWORD: enterprise123
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      UPLOAD_PATH: /app/uploads
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - upload_data:/app/uploads

volumes:
  mysql_data:
  upload_data:
